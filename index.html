<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Caixa</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">💰</div>
      <h1>Controle de Caixa</h1>
      <p>Acesso interno</p>

      <label>Usuário</label>
      <input type="text" id="loginUsuario" autocomplete="username" placeholder="Digite o usuário" />

      <label>Senha</label>
      <input type="password" id="loginSenha" autocomplete="current-password" placeholder="Digite a senha" />

      <button id="btnLogin" class="btn-login">Entrar</button>
      <div id="loginErro" class="login-erro"></div>
    </div>
  </section>

  <div id="appShell" class="app-shell bloqueado">
  <aside class="sidebar">
    <div class="brand">💰 Caixa</div>
    <button class="nav active" data-page="dashboard">🏠 Dashboard</button>
    <button class="nav" data-page="entradas">➕ Entradas</button>
    <button class="nav" data-page="saidas">➖ Saídas</button>
    <button class="nav" data-page="recorrencias">🔄 Recorrências</button>
    <button class="nav" data-page="previsao">📅 Fluxo Previsto</button>
    <button class="nav" data-page="relatorios">📄 Relatórios</button>
    <button class="nav" data-page="configuracoes">⚙️ Configurações</button>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="pageTitle">Controle de Caixa</h1>
        <p id="pageSubtitle">Sistema financeiro interno</p>
      </div>
      <div class="top-actions">
        <span id="statusConexao" class="status">Conectando...</span>
        <button id="btnSair" class="btn-sair">Sair</button>
      </div>
    </div>

    <section id="app"></section>
  </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/entradas.js"></script>
  <script src="js/saidas.js"></script>
  <script src="js/recorrencias.js"></script>
  <script src="js/previsao.js"></script>
  <script src="js/relatorios.js"></script>
  <script src="js/configuracoes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
