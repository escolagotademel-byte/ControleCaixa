<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Caixa</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <section id="loginTela" class="login-tela">
    <div class="login-card">
      <div class="login-logo">💰</div>
      <h1>Controle de Caixa</h1>
      <p>Acesso interno</p>
      <label>Usuário</label>
      <input id="loginUsuario" type="text" placeholder="Digite o usuário" autocomplete="username" />
      <label>Senha</label>
      <input id="loginSenha" type="password" placeholder="Digite a senha" autocomplete="current-password" />
      <button id="btnLogin">Entrar</button>
      <p id="loginErro" class="login-erro"></p>
    </div>
  </section>

  <div id="sistema" class="app oculto">
    <aside class="sidebar">
      <div class="brand">💰 <span>Caixa</span></div>
      <nav>
        <button class="nav-item ativo" data-page="dashboard">🏠 Dashboard</button>
        <button class="nav-item" data-page="entradas">➕ Entradas</button>
        <button class="nav-item" data-page="saidas">➖ Saídas</button>
        <button class="nav-item" data-page="recorrencias">🔄 Recorrências</button>
        <button class="nav-item" data-page="previsao">📅 Fluxo Previsto</button>
        <button class="nav-item" data-page="relatorios">📄 Relatórios</button>
        <button class="nav-item" data-page="configuracoes">⚙️ Configurações</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="tituloPagina">Controle de Caixa</h1>
          <p id="subtituloPagina">Resumo financeiro</p>
        </div>
        <div class="topbar-actions">
          <span id="statusNuvem" class="status">Conectando...</span>
          <button class="btn secundario" id="btnSair">Sair</button>
        </div>
      </header>

      <section id="conteudo"></section>
    </main>
  </div>

  <div id="toast" class="toast oculto"></div>
  <script src="js/app.js"></script>
</body>
</html>
